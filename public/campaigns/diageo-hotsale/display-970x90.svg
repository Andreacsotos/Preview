<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 970 90" width="970" height="90">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d3d1a"/>
      <stop offset="50%" style="stop-color:#1b5e2b"/>
      <stop offset="100%" style="stop-color:#0d3d1a"/>
    </linearGradient>
    <clipPath id="card"><rect width="970" height="90"/></clipPath>
  </defs>
  <g clip-path="url(#card)">
    <rect width="970" height="90" fill="url(#bg)"/>
    <ellipse cx="485" cy="160" rx="500" ry="130" fill="none" stroke="#2e7d3225" stroke-width="2"/>
    <!-- Logo block -->
    <rect x="22" y="28" width="42" height="18" rx="3" fill="#1877F2" opacity="0.9"/>
    <text x="43" y="41" text-anchor="middle" font-family="Arial" font-size="9" font-weight="700" fill="#fff">FIFA 26</text>
    <text x="76" y="41" font-family="Arial" font-size="9" font-weight="700" fill="#f5c518">BUCHANAN'S</text>
    <line x1="162" y1="18" x2="162" y2="72" stroke="#ffffff18" stroke-width="1"/>
    <!-- Main copy -->
    <text x="180" y="34" font-family="Arial Black, Arial" font-size="12" font-weight="900" fill="#ffffff">MANTÉN EL SABOR ENCENDIDO CON</text>
    <text x="180" y="62" font-family="Arial Black, Arial" font-size="26" font-weight="900" fill="#f5c518" letter-spacing="-1">20% OFF</text>
    <text x="180" y="78" font-family="Arial Black, Arial" font-size="9" font-weight="700" fill="#ffffff">EN BUCHANAN'S DELUXE 750 ML</text>
    <line x1="560" y1="18" x2="560" y2="72" stroke="#ffffff18" stroke-width="1"/>
    <!-- Product label -->
    <rect x="580" y="22" width="220" height="46" rx="4" fill="#0d3d1a" opacity="0.5"/>
    <text x="690" y="42" text-anchor="middle" font-family="Arial Black, Arial" font-size="10" font-weight="900" fill="#f5c518">PROMOTOR OFICIAL</text>
    <text x="690" y="56" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffffff">de la Copa Mundial de la FIFA 2026™</text>
    <line x1="818" y1="18" x2="818" y2="72" stroke="#ffffff18" stroke-width="1"/>
    <!-- Right block -->
    <text x="840" y="36" font-family="Arial Black, Arial" font-size="10" font-weight="900" fill="#f5c518">COPA MUNDIAL</text>
    <text x="840" y="50" font-family="Arial Black, Arial" font-size="10" font-weight="900" fill="#f5c518">DE LA FIFA</text>
    <text x="840" y="66" font-family="Arial Black, Arial" font-size="15" font-weight="900" fill="#f5c518">2026™</text>
    <!-- Legal strip -->
    <rect x="0" y="78" width="970" height="12" fill="#000000" opacity="0.35"/>
    <text x="485" y="87" text-anchor="middle" font-family="Arial" font-size="6" fill="#ffffff80">Diageo te invita a disfrutar con responsabilidad. Prohibida la venta a menores. Válido del 18 de julio hasta el 19 de julio del 2026.</text>
  </g>
</svg>
