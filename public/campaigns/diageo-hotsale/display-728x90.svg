<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 728 90" width="728" height="90">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d3d1a"/>
      <stop offset="50%" style="stop-color:#1b5e2b"/>
      <stop offset="100%" style="stop-color:#0d3d1a"/>
    </linearGradient>
    <clipPath id="card"><rect width="728" height="90"/></clipPath>
  </defs>
  <g clip-path="url(#card)">
    <rect width="728" height="90" fill="url(#bg)"/>
    <!-- Stadium arc -->
    <ellipse cx="364" cy="160" rx="380" ry="120" fill="none" stroke="#2e7d3230" stroke-width="1.5"/>
    <!-- Left: logos -->
    <rect x="18" y="30" width="38" height="16" rx="3" fill="#1877F2" opacity="0.9"/>
    <text x="37" y="42" text-anchor="middle" font-family="Arial" font-size="8" font-weight="700" fill="#fff">FIFA 26</text>
    <text x="66" y="42" font-family="Arial" font-size="8" font-weight="700" fill="#f5c518">BUCHANAN'S</text>
    <line x1="140" y1="20" x2="140" y2="70" stroke="#ffffff20" stroke-width="1"/>
    <!-- Center: copy -->
    <text x="160" y="36" font-family="Arial Black, Arial" font-size="11" font-weight="900" fill="#ffffff" letter-spacing="0.3">MANTÉN EL SABOR ENCENDIDO CON</text>
    <text x="160" y="62" font-family="Arial Black, Arial" font-size="22" font-weight="900" fill="#f5c518" letter-spacing="-0.5">20% OFF</text>
    <text x="160" y="78" font-family="Arial Black, Arial" font-size="9" font-weight="700" fill="#ffffff">EN BUCHANAN'S DELUXE 750 ML</text>
    <line x1="490" y1="20" x2="490" y2="70" stroke="#ffffff20" stroke-width="1"/>
    <!-- Right: CTA + footer -->
    <text x="510" y="38" font-family="Arial Black, Arial" font-size="9" font-weight="900" fill="#f5c518">COPA MUNDIAL</text>
    <text x="510" y="52" font-family="Arial Black, Arial" font-size="9" font-weight="900" fill="#f5c518">DE LA FIFA</text>
    <text x="510" y="68" font-family="Arial Black, Arial" font-size="13" font-weight="900" fill="#f5c518">2026™</text>
    <line x1="632" y1="20" x2="632" y2="70" stroke="#ffffff20" stroke-width="1"/>
    <!-- Brand -->
    <text x="650" y="42" text-anchor="middle" font-family="Arial" font-size="7" fill="#ffffff" letter-spacing="0.5">DIAGEO</text>
    <rect x="636" y="48" width="28" height="12" rx="2" fill="#f5c518"/>
    <text x="650" y="57" text-anchor="middle" font-family="Arial" font-size="6" font-weight="700" fill="#0d3d1a">+18</text>
    <!-- Bottom legal strip -->
    <rect x="0" y="78" width="728" height="12" fill="#000000" opacity="0.3"/>
    <text x="364" y="87" text-anchor="middle" font-family="Arial" font-size="6" fill="#ffffff80">Diageo te invita a disfrutar con responsabilidad. El exceso de alcohol es perjudicial para la salud. Válido hasta el 19 de julio del 2026.</text>
  </g>
</svg>
