<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250" width="300" height="250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3d1a"/>
      <stop offset="60%" style="stop-color:#1b5e2b"/>
      <stop offset="100%" style="stop-color:#134820"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#2e7d3280;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d3d1a00;stop-opacity:0"/>
    </radialGradient>
    <clipPath id="card"><rect width="300" height="250" rx="0"/></clipPath>
  </defs>
  <g clip-path="url(#card)">
    <rect width="300" height="250" fill="url(#bg)"/>
    <rect width="300" height="250" fill="url(#glow)"/>
    <!-- Stadium lines -->
    <ellipse cx="200" cy="200" rx="200" ry="90" fill="none" stroke="#2e7d3240" stroke-width="1"/>
    <ellipse cx="200" cy="200" rx="160" ry="70" fill="none" stroke="#2e7d3230" stroke-width="1"/>
    <line x1="0" y1="160" x2="300" y2="140" stroke="#2e7d3230" stroke-width="0.5"/>
    <!-- Left text block -->
    <text x="14" y="38" font-family="Arial Black, Arial" font-size="10" font-weight="900" fill="#ffffff" letter-spacing="0.5">MANTÉN</text>
    <text x="14" y="52" font-family="Arial Black, Arial" font-size="10" font-weight="900" fill="#ffffff" letter-spacing="0.5">EL SABOR ENCENDIDO CON</text>
    <text x="14" y="82" font-family="Arial Black, Arial" font-size="22" font-weight="900" fill="#f5c518" letter-spacing="-0.5">20% OFF</text>
    <text x="14" y="102" font-family="Arial Black, Arial" font-size="9" font-weight="700" fill="#ffffff">EN BUCHANAN'S DELUXE 750 ML</text>
    <!-- Logos row -->
    <rect x="14" y="114" width="32" height="14" rx="2" fill="#1877F2" opacity="0.9"/>
    <text x="30" y="124" text-anchor="middle" font-family="Arial" font-size="7" font-weight="700" fill="#fff">FIFA 26</text>
    <text x="54" y="124" font-family="Arial" font-size="7" font-weight="700" fill="#f5c518">BUCHANAN'S</text>
    <!-- Product bottle placeholder -->
    <rect x="188" y="30" width="72" height="170" rx="6" fill="#1a4a24" opacity="0.7" stroke="#f5c518" stroke-width="0.5"/>
    <text x="224" y="90" text-anchor="middle" font-family="Arial" font-size="8" font-weight="700" fill="#f5c518">BUCHANAN'S</text>
    <text x="224" y="102" text-anchor="middle" font-family="Arial" font-size="6" fill="#ffffff">DELUXE</text>
    <rect x="200" y="108" width="48" height="1" fill="#f5c518" opacity="0.5"/>
    <text x="224" y="122" text-anchor="middle" font-family="Arial" font-size="7" fill="#ffffff">12</text>
    <text x="224" y="132" text-anchor="middle" font-family="Arial" font-size="5" fill="#ffffff">AÑOS</text>
    <!-- Footer -->
    <rect x="0" y="218" width="300" height="32" fill="#000000" opacity="0.4"/>
    <text x="14" y="232" font-family="Arial Black, Arial" font-size="9" font-weight="900" fill="#f5c518">COPA MUNDIAL DE LA FIFA 2026</text>
    <text x="14" y="244" font-family="Arial" font-size="6" fill="#ffffff99">Diageo te invita a disfrutar con responsabilidad. +18.</text>
  </g>
</svg>
