<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 600" width="300" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3d1a"/>
      <stop offset="55%" style="stop-color:#1b5e2b"/>
      <stop offset="100%" style="stop-color:#0d3d1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="65%" cy="35%" r="55%">
      <stop offset="0%" style="stop-color:#2e7d3250"/>
      <stop offset="100%" style="stop-color:#0d3d1a00"/>
    </radialGradient>
    <clipPath id="card"><rect width="300" height="600"/></clipPath>
  </defs>
  <g clip-path="url(#card)">
    <rect width="300" height="600" fill="url(#bg)"/>
    <rect width="300" height="600" fill="url(#glow)"/>
    <!-- Stadium lines -->
    <ellipse cx="150" cy="460" rx="260" ry="160" fill="none" stroke="#2e7d3230" stroke-width="1.5"/>
    <ellipse cx="150" cy="460" rx="200" ry="120" fill="none" stroke="#2e7d3220" stroke-width="1"/>
    <!-- Top logos -->
    <rect x="18" y="22" width="48" height="20" rx="3" fill="#1877F2" opacity="0.9"/>
    <text x="42" y="36" text-anchor="middle" font-family="Arial" font-size="10" font-weight="700" fill="#fff">FIFA 26</text>
    <line x1="76" y1="24" x2="76" y2="40" stroke="#ffffff30" stroke-width="1"/>
    <text x="84" y="36" font-family="Arial" font-size="10" font-weight="700" fill="#f5c518">BUCHANAN'S</text>
    <line x1="18" y1="50" x2="282" y2="50" stroke="#ffffff18" stroke-width="1"/>
    <text x="150" y="70" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffffff90" letter-spacing="1.5">PROMOTOR OFICIAL DE LA</text>
    <text x="150" y="82" text-anchor="middle" font-family="Arial" font-size="8" fill="#ffffff90" letter-spacing="1.5">COPA MUNDIAL DE LA FIFA 2026™</text>
    <!-- Headline -->
    <text x="18" y="120" font-family="Arial Black, Arial" font-size="20" font-weight="900" fill="#ffffff" letter-spacing="-0.5">MANTÉN</text>
    <text x="18" y="145" font-family="Arial Black, Arial" font-size="20" font-weight="900" fill="#ffffff">EL SABOR</text>
    <text x="18" y="170" font-family="Arial Black, Arial" font-size="20" font-weight="900" fill="#ffffff">ENCENDIDO</text>
    <text x="18" y="195" font-family="Arial Black, Arial" font-size="20" font-weight="900" fill="#ffffff">CON</text>
    <!-- Big discount -->
    <text x="18" y="258" font-family="Arial Black, Arial" font-size="58" font-weight="900" fill="#f5c518" letter-spacing="-2">20%</text>
    <text x="18" y="305" font-family="Arial Black, Arial" font-size="58" font-weight="900" fill="#f5c518" letter-spacing="-2">OFF</text>
    <!-- Product copy -->
    <text x="18" y="335" font-family="Arial Black, Arial" font-size="11" font-weight="700" fill="#ffffff">EN BUCHANAN'S DELUXE 750 ML</text>
    <!-- Bottle illustration -->
    <rect x="168" y="220" width="90" height="220" rx="8" fill="#1a4a24" opacity="0.65" stroke="#f5c51850" stroke-width="1"/>
    <text x="213" y="300" text-anchor="middle" font-family="Arial Black" font-size="9" font-weight="900" fill="#f5c518">BUCHANAN'S</text>
    <text x="213" y="315" text-anchor="middle" font-family="Arial" font-size="7" fill="#ffffff">DELUXE</text>
    <rect x="185" y="320" width="56" height="1" fill="#f5c518" opacity="0.5"/>
    <text x="213" y="338" text-anchor="middle" font-family="Arial Black" font-size="18" fill="#f5c518">12</text>
    <text x="213" y="352" text-anchor="middle" font-family="Arial" font-size="7" fill="#ffffff">AÑOS</text>
    <text x="213" y="364" text-anchor="middle" font-family="Arial" font-size="6" fill="#ffffff80">40% VOL. ALC.</text>
    <!-- Footer bar -->
    <rect x="0" y="540" width="300" height="60" fill="#000000" opacity="0.45"/>
    <text x="150" y="562" text-anchor="middle" font-family="Arial Black, Arial" font-size="11" font-weight="900" fill="#f5c518">COPA MUNDIAL</text>
    <text x="150" y="577" text-anchor="middle" font-family="Arial Black, Arial" font-size="11" font-weight="900" fill="#f5c518">DE LA FIFA 2026™</text>
    <text x="150" y="592" text-anchor="middle" font-family="Arial" font-size="6" fill="#ffffff60">Diageo te invita a disfrutar con responsabilidad. +18.</text>
  </g>
</svg>
