<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1b3d"/>
      <stop offset="100%" style="stop-color:#1a3a7e"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD166"/>
      <stop offset="100%" style="stop-color:#F4A228"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e6fc7"/>
      <stop offset="100%" style="stop-color:#0d4a9e"/>
    </linearGradient>
    <clipPath id="card">
      <rect width="600" height="380" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#card)">
    <!-- Background sky -->
    <rect width="600" height="380" fill="url(#bg)"/>

    <!-- Stars -->
    <circle cx="80" cy="40" r="1.5" fill="#fff" opacity="0.6"/>
    <circle cx="150" cy="25" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="230" cy="55" r="1.5" fill="#fff" opacity="0.7"/>
    <circle cx="310" cy="20" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="420" cy="35" r="2" fill="#fff" opacity="0.6"/>
    <circle cx="500" cy="50" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="560" cy="28" r="1.5" fill="#fff" opacity="0.7"/>

    <!-- Sun / Moon glow -->
    <circle cx="480" cy="90" r="55" fill="#FFD16620"/>
    <circle cx="480" cy="90" r="38" fill="url(#sun)" opacity="0.95"/>
    <!-- Sun rays -->
    <line x1="480" y1="40" x2="480" y2="28" stroke="#FFD166" stroke-width="2.5" opacity="0.7"/>
    <line x1="480" y1="140" x2="480" y2="152" stroke="#FFD166" stroke-width="2.5" opacity="0.7"/>
    <line x1="430" y1="90" x2="418" y2="90" stroke="#FFD166" stroke-width="2.5" opacity="0.7"/>
    <line x1="530" y1="90" x2="542" y2="90" stroke="#FFD166" stroke-width="2.5" opacity="0.7"/>
    <line x1="445" y1="55" x2="437" y2="47" stroke="#FFD166" stroke-width="2" opacity="0.6"/>
    <line x1="515" y1="125" x2="523" y2="133" stroke="#FFD166" stroke-width="2" opacity="0.6"/>
    <line x1="515" y1="55" x2="523" y2="47" stroke="#FFD166" stroke-width="2" opacity="0.6"/>
    <line x1="445" y1="125" x2="437" y2="133" stroke="#FFD166" stroke-width="2" opacity="0.6"/>

    <!-- Ocean -->
    <rect x="0" y="240" width="600" height="140" fill="url(#water)"/>
    <!-- Waves -->
    <path d="M0 245 Q50 238 100 245 Q150 252 200 245 Q250 238 300 245 Q350 252 400 245 Q450 238 500 245 Q550 252 600 245" stroke="#3b8de8" stroke-width="2" fill="none" opacity="0.5"/>
    <path d="M0 260 Q60 253 120 260 Q180 267 240 260 Q300 253 360 260 Q420 267 480 260 Q540 253 600 260" stroke="#3b8de8" stroke-width="1.5" fill="none" opacity="0.35"/>

    <!-- Sun reflection on water -->
    <ellipse cx="480" cy="255" rx="40" ry="6" fill="#FFD16640"/>
    <ellipse cx="480" cy="270" rx="28" ry="4" fill="#FFD16630"/>
    <ellipse cx="480" cy="283" rx="18" ry="3" fill="#FFD16620"/>

    <!-- Beach/horizon -->
    <path d="M0 238 Q300 228 600 240 L600 248 Q300 236 0 246 Z" fill="#e8c97a" opacity="0.7"/>

    <!-- Palm tree left -->
    <rect x="68" y="150" width="8" height="100" rx="4" fill="#4a3820"/>
    <path d="M72 155 Q40 130 20 110" stroke="#2d7a3a" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M72 155 Q55 125 62 100" stroke="#2d7a3a" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M72 155 Q90 130 105 115" stroke="#3a8f45" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M72 155 Q100 145 120 140" stroke="#3a8f45" stroke-width="6" stroke-linecap="round" fill="none"/>
    <circle cx="62" cy="175" r="5" fill="#8a6030" opacity="0.8"/>

    <!-- Palm tree right -->
    <rect x="524" y="160" width="8" height="90" rx="4" fill="#4a3820"/>
    <path d="M528 165 Q500 140 480 120" stroke="#2d7a3a" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M528 165 Q515 135 522 112" stroke="#3a8f45" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M528 165 Q548 140 562 125" stroke="#2d7a3a" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M528 165 Q552 158 572 155" stroke="#3a8f45" stroke-width="6" stroke-linecap="round" fill="none"/>

    <!-- Horizon sailboat -->
    <line x1="280" y1="200" x2="280" y2="235" stroke="#fff" stroke-width="1.5" opacity="0.7"/>
    <path d="M280 205 L265 230 L295 230 Z" fill="#fff" opacity="0.6"/>
    <rect x="260" y="233" width="40" height="5" rx="2.5" fill="#c8a86a" opacity="0.8"/>

    <!-- Main headline block -->
    <rect x="160" y="110" width="280" height="110" rx="12" fill="#000000" opacity="0.35"/>

    <!-- Brand logo area -->
    <rect x="182" y="126" width="56" height="20" rx="4" fill="#2c6bf2"/>
    <text x="210" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#fff">BLOOM</text>

    <!-- Main title -->
    <text x="300" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff" letter-spacing="2">VERANO</text>
    <text x="300" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#FFD166" letter-spacing="2">2026</text>

    <!-- Tagline -->
    <text x="300" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffffaa" letter-spacing="1.5">COLECCIÓN VERANO · BLOOM STUDIO</text>

    <!-- CTA pill -->
    <rect x="232" y="290" width="136" height="36" rx="18" fill="#FFD166"/>
    <text x="300" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#0f1b3d">DESCUBRIR MÁS</text>

    <!-- Bottom brand watermark -->
    <text x="300" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ffffff55" letter-spacing="3">VIEW STUDIO · PREVIEW APROBADO</text>
  </g>
</svg>
